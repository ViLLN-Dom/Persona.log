<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#060610;overscroll-behavior:none;}
body{color:#e0e0e0;font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
input,button{font-family:'Rajdhani',sans-serif;}
input::placeholder{color:#333;}
input[type=number]::-webkit-inner-spin-button{opacity:1;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#0a0a16;}
::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:2px;}

:root{
  --c-body:#ff4757; --g-body:#ff475733;
  --c-spirit:#5352ed; --g-spirit:#5352ed33;
  --c-mind:#ffa502; --g-mind:#ffa50233;
  --c-soul:#2ed573; --g-soul:#2ed57333;
  --c-play:#ff6eb4; --g-play:#ff6eb433;
  --bg:#060610; --bg2:#0a0a16; --bg3:#0f0f1e; --border:#1a1a2e; --border2:#2a2a3e;
}

@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}50%{opacity:1;transform:translateY(-30px) scale(1.1);}100%{opacity:0;transform:translateY(-70px) scale(0.9);}}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes levelUp{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}20%{opacity:1;transform:translate(-50%,-50%) scale(1.05);}80%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-50%) scale(0.95);}}
@keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}
@keyframes shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
@keyframes barFill{from{width:0;}to{width:var(--w);}}
@keyframes toastIn{from{opacity:0;transform:translateX(100%);}to{opacity:1;transform:translateX(0);}}
@keyframes toastOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(100%);}}
@keyframes streakFlash{0%,100%{color:#ffa502;}50%{color:#fff;text-shadow:0 0 20px #ffa502;}}

.tab-content{animation:slideIn 0.25s ease;}
.shimmer-text{background:linear-gradient(90deg,#fff 25%,#888 50%,#fff 75%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite;}

/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px);padding:16px;}
.modal-box{background:var(--bg2);border-radius:4px;padding:28px;width:100%;max-width:360px;position:relative;}
.corner{position:absolute;width:12px;height:12px;}
.corner.tl{top:-1px;left:-1px;border-top:2px solid var(--cc);border-left:2px solid var(--cc);}
.corner.tr{top:-1px;right:-1px;border-top:2px solid var(--cc);border-right:2px solid var(--cc);}
.corner.bl{bottom:-1px;left:-1px;border-bottom:2px solid var(--cc);border-left:2px solid var(--cc);}
.corner.br{bottom:-1px;right:-1px;border-bottom:2px solid var(--cc);border-right:2px solid var(--cc);}

.stat-input{width:100%;background:var(--bg);border:1px solid #2a2a3e;color:#e0e0e0;padding:10px 12px;border-radius:2px;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.stat-input:focus{border-color:var(--cc);}

.cat-btn{padding:14px 10px;background:rgba(255,255,255,0.03);border:1px solid #1a1a2e;border-radius:3px;color:#888;font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;text-align:left;transition:all 0.2s;width:100%;}
.cat-btn:hover,.cat-btn:active{background:rgba(255,255,255,0.06);}

.tab-btn{flex:1;padding:9px;background:transparent;border:none;color:#444;font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all 0.2s;}
.tab-btn.active{background:#1a1a2e;color:#fff;}

.action-btn{width:100%;padding:13px;border:1px solid rgba(255,255,255,0.15);color:#ccc;font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all 0.2s;background:rgba(255,255,255,0.04);}
.action-btn:hover{background:rgba(255,255,255,0.08);}
.action-btn.primary{border-color:var(--cc);color:var(--cc);background:rgba(255,255,255,0.02);}
.action-btn.primary:hover{background:rgba(255,255,255,0.06);}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:22px;margin-bottom:14px;}
.card-label{font-size:9px;letter-spacing:4px;color:#333;margin-bottom:18px;}

/* Level-up splash */
#levelup-splash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:500;pointer-events:none;display:none;text-align:center;}
#levelup-splash.show{display:block;animation:levelUp 2.5s ease forwards;}

/* Toast */
#toast-container{position:fixed;top:env(safe-area-inset-top,16px);right:0;z-index:400;display:flex;flex-direction:column;gap:8px;padding:16px;pointer-events:none;}
.toast{background:#0f0f1e;border-left:3px solid var(--tc);padding:12px 16px;border-radius:3px;font-size:11px;letter-spacing:2px;color:#ccc;min-width:200px;animation:toastIn 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.toast.out{animation:toastOut 0.3s ease forwards;}

/* Frequent chips */
.freq-chip{padding:6px 12px;background:rgba(255,255,255,0.04);border:1px solid #2a2a3e;border-radius:20px;font-size:10px;letter-spacing:1px;color:#888;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.freq-chip:hover{border-color:#444;color:#ccc;}
</style>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const CATS = [
  {id:'fitness', label:'Health & Fitness', short:'BODY',   icon:'⚔', color:'#ff4757'},
  {id:'sleep',   label:'Sleep & Rest',     short:'SPIRIT', icon:'✦', color:'#5352ed'},
  {id:'work',    label:'Work & Career',    short:'MIND',   icon:'◈', color:'#ffa502'},
  {id:'hobbies', label:'Hobbies & Creative',short:'SOUL',  icon:'❋', color:'#2ed573'},
  {id:'play',    label:'Entertainment',    short:'PLAY',   icon:'◉', color:'#ff6eb4'},
];

function defaultState(){
  return {
    stats: Object.fromEntries(CATS.map(c=>[c.id,{xp:0,streak:0,lastDay:null}])),
    tasks: [],       // {catId,name,hours,xp,date,day}
    levelups: [],    // {catId,level,date}
    day: 1,
    startDate: new Date().toDateString()
  };
}

function load(){
  try{
    const s = localStorage.getItem('persona_log_v2');
    if(s) return JSON.parse(s);
  }catch(e){}
  return defaultState();
}
function save(){ localStorage.setItem('persona_log_v2', JSON.stringify(STATE)); }

let STATE = load();
let activeTab = 'stats';
let modalCat = null;

// ── XP / LEVEL ────────────────────────────────────────────────────────────────
function xpToLevel(xp){ return Math.min(99, Math.floor(Math.sqrt(xp/10))); }
function xpForLevel(l){ return l*l*10; }
function xpProgress(xp){
  const l=xpToLevel(xp); if(l>=99) return 100;
  const c=xpForLevel(l), n=xpForLevel(l+1);
  return Math.round((xp-c)/(n-c)*100);
}

// ── STREAKS ───────────────────────────────────────────────────────────────────
function updateStreak(catId){
  const s=STATE.stats[catId];
  const today=STATE.day;
  if(s.lastDay===today) return; // already logged today
  if(s.lastDay===today-1){ s.streak=(s.streak||0)+1; }
  else if(s.lastDay!==today){ s.streak=1; }
  s.lastDay=today;
}

// ── RADAR ──────────────────────────────────────────────────────────────────────
function drawRadar(){
  const cv=document.getElementById('radar');
  if(!cv) return;
  const ctx=cv.getContext('2d');
  const W=170,H=170,cx=W/2,cy=H/2,r=58,n=CATS.length;
  ctx.clearRect(0,0,W,H);

  // grid
  for(let ring=1;ring<=4;ring++){
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2-Math.PI/2;
      const fr=ring/4;
      const x=cx+Math.cos(a)*r*fr, y=cy+Math.sin(a)*r*fr;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle='rgba(255,255,255,0.06)';
    ctx.lineWidth=1; ctx.stroke();
  }
  // axes
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2-Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    ctx.strokeStyle='rgba(255,255,255,0.06)';
    ctx.stroke();
  }

  // stat shape
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const cat=CATS[i];
    const lvl=xpToLevel(STATE.stats[cat.id].xp);
    const frac=lvl/99;
    const a=(i/n)*Math.PI*2-Math.PI/2;
    const x=cx+Math.cos(a)*r*frac, y=cy+Math.sin(a)*r*frac;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,0.04)';
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)';
  ctx.lineWidth=1.5; ctx.stroke();

  // dots + labels
  for(let i=0;i<n;i++){
    const cat=CATS[i];
    const lvl=xpToLevel(STATE.stats[cat.id].xp);
    const frac=lvl/99;
    const a=(i/n)*Math.PI*2-Math.PI/2;
    const x=cx+Math.cos(a)*r*frac, y=cy+Math.sin(a)*r*frac;
    const lx=cx+Math.cos(a)*(r+18), ly=cy+Math.sin(a)*(r+18);

    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=cat.color;
    ctx.shadowColor=cat.color; ctx.shadowBlur=8;
    ctx.fill(); ctx.shadowBlur=0;

    ctx.font='bold 9px Rajdhani, sans-serif';
    ctx.fillStyle=cat.color;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(cat.short,lx,ly);
  }
}

// ── STAT BARS ─────────────────────────────────────────────────────────────────
function renderStatBars(){
  const el=document.getElementById('stat-bars');
  el.innerHTML=CATS.map(cat=>{
    const xp=STATE.stats[cat.id].xp;
    const lvl=xpToLevel(xp);
    const prog=xpProgress(xp);
    return `
    <div style="margin-bottom:18px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="color:${cat.color};font-size:15px;filter:drop-shadow(0 0 5px ${cat.color})">${cat.icon}</span>
          <span style="font-size:12px;letter-spacing:3px;color:#888;text-transform:uppercase;">${cat.short}</span>
        </div>
        <div style="display:flex;align-items:baseline;gap:5px;">
          <span style="font-size:10px;color:#555;letter-spacing:1px;">LV</span>
          <span style="font-family:'Share Tech Mono',monospace;font-size:24px;color:${cat.color};text-shadow:0 0 10px ${cat.color};line-height:1;">${String(lvl).padStart(2,'0')}</span>
        </div>
      </div>
      <div style="height:7px;background:#0a0a16;border-radius:4px;border:1px solid #1a1a2e;overflow:hidden;position:relative;">
        <div style="height:100%;width:${prog}%;background:linear-gradient(90deg,${cat.color}88,${cat.color});box-shadow:0 0 8px ${cat.color}66;border-radius:4px;transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1);position:relative;">
          <div style="position:absolute;right:0;top:0;bottom:0;width:2px;background:white;opacity:0.5;"></div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;">
        <span style="font-size:9px;color:#333;letter-spacing:1px;">${xp} XP</span>
        <span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#333;">${prog}%</span>
      </div>
    </div>`;
  }).join('');
}

// ── TIME SPLIT ────────────────────────────────────────────────────────────────
function renderTimeSplit(){
  const el=document.getElementById('time-split');
  const total=STATE.tasks.reduce((a,t)=>a+t.hours,0);
  if(total===0){
    el.innerHTML='<div style="font-size:11px;color:#333;letter-spacing:2px;text-align:center;padding:12px 0;">LOG ACTIVITIES TO SEE BREAKDOWN</div>';
    return;
  }
  el.innerHTML=CATS.map(cat=>{
    const hrs=STATE.tasks.filter(t=>t.catId===cat.id).reduce((a,t)=>a+t.hours,0);
    const pct=total>0?(hrs/total)*100:0;
    return `
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <span style="font-size:11px;letter-spacing:2px;color:${cat.color};">${cat.short}</span>
        <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#555;">${hrs.toFixed(1)}h · ${Math.round(pct)}%</span>
      </div>
      <div style="height:5px;background:#0a0a16;border-radius:2px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:${cat.color};border-radius:2px;box-shadow:0 0 6px ${cat.color}55;transition:width 0.6s ease;"></div>
      </div>
    </div>`;
  }).join('');
}

// ── STREAKS ───────────────────────────────────────────────────────────────────
function renderStreaks(){
  const el=document.getElementById('streaks-display');
  const rows=CATS.map(cat=>{
    const s=STATE.stats[cat.id].streak||0;
    const fire=s>=7?'🔥':s>=3?'⚡':'·';
    return `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #0f0f1e;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="color:${cat.color};font-size:13px;">${cat.icon}</span>
        <span style="font-size:12px;letter-spacing:2px;color:#888;">${cat.short}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-family:'Share Tech Mono',monospace;font-size:14px;color:${s>0?'#ffa502':'#333'};${s>=3?'animation:streakFlash 1.5s infinite;':''}">${s} DAY${s!==1?'S':''}</span>
        <span style="font-size:14px;">${fire}</span>
      </div>
    </div>`;
  }).join('');
  el.innerHTML=rows;
}

// ── NEGLECT ───────────────────────────────────────────────────────────────────
function renderNeglect(){
  const sorted=[...CATS].sort((a,b)=>xpToLevel(STATE.stats[a.id].xp)-xpToLevel(STATE.stats[b.id].xp));
  const n=sorted[0];
  const lvl=xpToLevel(STATE.stats[n.id].xp);
  document.getElementById('neglect-icon').textContent=n.icon;
  document.getElementById('neglect-icon').style.color=n.color;
  document.getElementById('neglect-icon').style.filter=`drop-shadow(0 0 6px ${n.color})`;
  document.getElementById('neglect-name').textContent=n.short;
  document.getElementById('neglect-name').style.color=n.color;
  document.getElementById('neglect-name').style.textShadow=`0 0 12px ${n.color}`;
  document.getElementById('neglect-level').textContent=`Level ${lvl} · Falling behind`;
}

// ── HEADER ────────────────────────────────────────────────────────────────────
function renderHeader(){
  const total=STATE.tasks.reduce((a,t)=>a+t.hours,0);
  document.getElementById('header-sub').textContent=`DAY ${String(STATE.day).padStart(3,'0')}  ·  ${total.toFixed(1)}h LOGGED`;
}

// ── CAT BUTTONS ───────────────────────────────────────────────────────────────
function renderCatButtons(){
  const el=document.getElementById('cat-buttons');
  el.innerHTML=CATS.map(cat=>{
    const lvl=xpToLevel(STATE.stats[cat.id].xp);
    return `
    <button class="cat-btn" onclick="openModal('${cat.id}')" style="border-color:${cat.color}22;">
      <div style="font-size:16px;margin-bottom:6px;color:${cat.color};filter:drop-shadow(0 0 4px ${cat.color})">${cat.icon}</div>
      <div style="color:${cat.color};letter-spacing:2px;font-size:11px;">${cat.short}</div>
      <div style="font-size:9px;color:${cat.color}77;margin-top:2px;letter-spacing:1px;">LV ${lvl}</div>
    </button>`;
  }).join('');
}

// ── ACTIVITY LOG ──────────────────────────────────────────────────────────────
function renderActivityLog(){
  const el=document.getElementById('activity-log');
  const tasks=[...STATE.tasks].reverse().slice(0,20);
  if(!tasks.length){
    el.innerHTML='<div style="font-size:11px;color:#333;letter-spacing:2px;text-align:center;padding:12px 0;">NO ACTIVITIES YET</div>';
    return;
  }
  el.innerHTML=tasks.map(t=>{
    const cat=CATS.find(c=>c.id===t.catId)||CATS[0];
    return `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #0f0f1e;">
      <div style="display:flex;align-items:center;gap:10px;min-width:0;">
        <span style="color:${cat.color};font-size:12px;flex-shrink:0;">${cat.icon}</span>
        <div style="min-width:0;">
          <div style="font-size:13px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;">${t.name}</div>
          <div style="font-size:9px;letter-spacing:1px;color:#444;margin-top:2px;">DAY ${String(t.day).padStart(3,'0')} · ${cat.short}</div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:10px;">
        <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:${cat.color};">+${t.xp} XP</div>
        <div style="font-size:9px;color:#444;margin-top:2px;">${t.hours}h</div>
      </div>
    </div>`;
  }).join('');
}

// ── LEVELUP LOG ───────────────────────────────────────────────────────────────
function renderLevelupLog(){
  const el=document.getElementById('levelup-log');
  const log=[...STATE.levelups].reverse().slice(0,10);
  if(!log.length){
    el.innerHTML='<div style="font-size:11px;color:#333;letter-spacing:2px;text-align:center;padding:12px 0;">LEVEL UP TO SEE LOG</div>';
    return;
  }
  el.innerHTML=log.map(l=>{
    const cat=CATS.find(c=>c.id===l.catId)||CATS[0];
    return `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #0f0f1e;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="color:${cat.color};font-size:13px;filter:drop-shadow(0 0 4px ${cat.color})">${cat.icon}</span>
        <div>
          <span style="font-size:13px;color:${cat.color};letter-spacing:2px;">${cat.short}</span>
          <span style="font-size:11px;color:#666;margin-left:6px;">reached</span>
          <span style="font-family:'Share Tech Mono',monospace;font-size:13px;color:#ffa502;margin-left:6px;">LV ${l.level}</span>
        </div>
      </div>
      <span style="font-size:9px;color:#444;letter-spacing:1px;">DAY ${String(l.day).padStart(3,'0')}</span>
    </div>`;
  }).join('');
}

// ── FREQUENT ACTIVITIES ───────────────────────────────────────────────────────
function getFrequent(catId){
  const counts={};
  STATE.tasks.filter(t=>t.catId===catId).forEach(t=>{ counts[t.name]=(counts[t.name]||0)+1; });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>e[0]);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(catId){
  modalCat=CATS.find(c=>c.id===catId);
  const cc=modalCat.color;
  // set CSS var on modal for corners
  document.getElementById('modal-box').style.border=`1px solid ${cc}33`;
  document.getElementById('modal-box').style.boxShadow=`0 0 40px ${cc}22`;
  ['mc-tl','mc-tr','mc-bl','mc-br'].forEach(id=>{
    document.getElementById(id).style.setProperty('--cc',cc);
  });
  document.getElementById('modal-icon').textContent=modalCat.icon;
  document.getElementById('modal-icon').style.color=cc;
  document.getElementById('modal-icon').style.filter=`drop-shadow(0 0 6px ${cc})`;
  document.getElementById('modal-stat-name').textContent=modalCat.short;
  document.getElementById('modal-stat-name').style.color=cc;
  document.getElementById('modal-confirm').style.setProperty('--cc',cc);
  document.getElementById('modal-confirm').style.borderColor=cc+'88';
  document.getElementById('modal-confirm').style.color=cc;

  const freq=getFrequent(catId);
  const fs=document.getElementById('freq-section');
  const fc=document.getElementById('freq-chips');
  if(freq.length){
    fs.style.display='block';
    fc.innerHTML=freq.map(f=>`<button class="freq-chip" onclick="fillTask('${f.replace(/'/g,"\\'")}') ">${f}</button>`).join('');
  } else {
    fs.style.display='none';
  }

  document.getElementById('task-name').value='';
  document.getElementById('task-hours').value='';
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('task-name').focus(),100);
}

function fillTask(name){
  document.getElementById('task-name').value=name;
  document.getElementById('task-hours').focus();
}

function closeModal(){
  document.getElementById('modal').style.display='none';
  modalCat=null;
}

function submitTask(){
  if(!modalCat) return;
  const name=document.getElementById('task-name').value.trim();
  if(!name) return;
  const hours=parseFloat(document.getElementById('task-hours').value)||0.5;
  const xpGain=Math.round(hours*30);
  const catId=modalCat.id;

  const prevLevel=xpToLevel(STATE.stats[catId].xp);
  STATE.stats[catId].xp+=xpGain;
  const newLevel=xpToLevel(STATE.stats[catId].xp);

  updateStreak(catId);

  STATE.tasks.push({catId,name,hours,xp:xpGain,date:new Date().toISOString(),day:STATE.day});

  if(newLevel>prevLevel){
    STATE.levelups.push({catId,level:newLevel,day:STATE.day,date:new Date().toISOString()});
    showLevelUp(modalCat,newLevel);
  }

  save();
  closeModal();
  renderAll();
  showXPFloat(xpGain,modalCat.color);
  showToast(`+${xpGain} XP · ${modalCat.short}`,modalCat.color);
}

// ── FX ────────────────────────────────────────────────────────────────────────
function showXPFloat(xp,color){
  const el=document.createElement('div');
  el.style.cssText=`font-family:'Share Tech Mono',monospace;font-size:20px;color:${color};text-shadow:0 0 10px ${color};animation:floatUp 1.8s ease forwards;margin-bottom:4px;`;
  el.textContent=`+${xp} XP`;
  document.getElementById('float-container').appendChild(el);
  setTimeout(()=>el.remove(),1900);
}

function showToast(msg,color='#fff'){
  const tc=document.getElementById('toast-container');
  const el=document.createElement('div');
  el.className='toast';
  el.style.setProperty('--tc',color);
  el.textContent=msg;
  tc.appendChild(el);
  setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),400); },2500);
}

function showLevelUp(cat,level){
  const el=document.getElementById('levelup-splash');
  document.getElementById('lu-stat').textContent=cat.short;
  document.getElementById('lu-stat').style.color=cat.color;
  document.getElementById('lu-stat').style.textShadow=`0 0 20px ${cat.color}`;
  document.getElementById('lu-level').textContent=String(level).padStart(2,'0');
  document.getElementById('lu-level').style.color=cat.color;
  document.getElementById('lu-level').style.textShadow=`0 0 30px ${cat.color}`;
  el.className='show';
  setTimeout(()=>{ el.className=''; },2600);
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab){
  activeTab=tab;
  ['stats','log','history'].forEach(t=>{
    document.getElementById('pane-'+t).style.display=t===tab?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='stats'){ drawRadar(); }
}

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll(){
  renderHeader();
  renderNeglect();
  renderStatBars();
  renderTimeSplit();
  renderStreaks();
  renderCatButtons();
  renderActivityLog();
  renderLevelupLog();
  drawRadar();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderAll();
</script>

<!-- PWA Service Worker registration -->

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('data:text/javascript,'+encodeURIComponent(`
    const CACHE='persona-log-v1';
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE)));
    self.addEventListener('fetch',e=>e.respondWith(
      caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
        const clone=res.clone();
        caches.open(CACHE).then(c=>c.put(e.request,clone));
        return res;
      }))
    ));
  `)).catch(()=>{});
}
</script>
